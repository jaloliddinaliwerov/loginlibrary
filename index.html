<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | Library 797</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #09090b;
            --grid-color: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: #a1a1a6;
            --accent-blue: #2997ff;
            --accent-gradient: linear-gradient(135deg, #2997ff, #0071e3);
            --nav-bg: rgba(20, 20, 22, 0.7);
            --glass-btn-bg: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(25, 25, 28, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.5);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg-color: #eef1f5;
            --grid-color: rgba(0, 0, 0, 0.03);
            --text-main: #111111;
            --text-muted: #737373;
            --accent-blue: #0071e3;
            --accent-gradient: linear-gradient(135deg, #0071e3, #2997ff);
            --nav-bg: rgba(255, 255, 255, 0.7);
            --glass-btn-bg: rgba(0, 0, 0, 0.04);
            --border-color: rgba(0, 0, 0, 0.06);
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(255, 255, 255, 1);
            --card-shadow: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(0, 0, 0, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: background-color 0.4s, color 0.4s, border-color 0.4s; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow-x: hidden; padding: 20px; }

        .grid-bg { position: fixed; inset: 0; z-index: -3; pointer-events: none; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 50px 50px; }
        .ambient-bg { position: fixed; inset: 0; z-index: -2; overflow: hidden; pointer-events: none; }
        .ambient-blob { position: absolute; filter: blur(140px); border-radius: 50%; animation: floatBlob 22s infinite alternate ease-in-out; opacity: 0.35; }
        .blob-1 { width: 55vw; height: 55vw; background: var(--accent-blue); top: -20%; left: -10%; }
        .blob-2 { width: 45vw; height: 45vw; background: #af52de; bottom: -10%; right: -10%; animation-delay: -6s; opacity: 0.25; }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(8%, 8%) scale(1.1); } }

        /* HEADER NAV */
        .auth-nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 1000px; height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; z-index: 1000; background: var(--nav-bg); backdrop-filter: blur(25px) saturate(180%); border: 1px solid var(--border-color); border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.3rem; font-weight: 900; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--accent-blue); font-size: 0.9rem; font-weight: 700; background: rgba(0,113,227,0.1); padding: 4px 10px; border-radius: 20px; }
        .theme-toggle { background: var(--glass-btn-bg); border: 1px solid var(--border-color); color: var(--text-main); width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: transform 0.2s; }
        .theme-toggle:hover { transform: scale(1.08); }

        /* AUTH CARD CONTAINER */
        .auth-container { width: 100%; max-width: 440px; margin-top: 60px; z-index: 10; }
        .auth-card { background: var(--card-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--border-color); border-top: 1px solid var(--card-border); box-shadow: 0 30px 60px var(--card-shadow); border-radius: 35px; padding: 45px 35px; position: relative; overflow: hidden; }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }

        /* TAB SWITCHER */
        .tabs { display: flex; background: var(--glass-btn-bg); border-radius: 30px; padding: 5px; margin-bottom: 30px; border: 1px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-weight: 700; color: var(--text-muted); cursor: pointer; border-radius: 25px; transition: all 0.3s ease; border: none; background: transparent; font-size: 0.95rem; }
        .tab-btn.active { background: var(--card-bg); color: var(--text-main); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* FORM FIELD */
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 18px; color: var(--text-muted); width: 20px; height: 20px; pointer-events: none; }
        
        .form-control { width: 100%; padding: 15px 18px 15px 50px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-main); font-size: 1rem; font-weight: 500; outline: none; transition: all 0.3s cubic-bezier(0.25, 1, 0.3, 1); }
        .form-control:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15); background: var(--card-bg); }

        .submit-btn { width: 100%; padding: 16px; background: var(--accent-gradient); color: white; border: none; border-radius: 25px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 15px 30px rgba(0, 113, 227, 0.3); margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0, 113, 227, 0.4); }
        .submit-btn:active { transform: translateY(0); }

        .alert-box { padding: 14px; border-radius: 18px; font-size: 0.9rem; font-weight: 600; text-align: center; margin-bottom: 20px; display: none; }
        .alert-error { background: rgba(255, 59, 48, 0.15); border: 1px solid rgba(255, 59, 48, 0.3); color: #ff3b30; }
        .alert-success { background: rgba(52, 199, 89, 0.15); border: 1px solid rgba(52, 199, 89, 0.3); color: #34c759; }

        .form-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted); }
        .form-footer a { color: var(--accent-blue); text-decoration: none; font-weight: 700; margin-left: 5px; }
        .form-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="ambient-bg">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
    </div>

    <nav class="auth-nav">
        <a href="index.html" class="logo">
            Library 797 <span>Digital</span>
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2 id="headerTitle">Xush Kelibsiz</h2>
                <p id="headerSubtitle">Library 797 raqamli kutubxonasiga kirish</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" id="tabLogin" onclick="switchForm('login')">Kirish</button>
                <button class="tab-btn" id="tabRegister" onclick="switchForm('register')">Ro'yxatdan o'tish</button>
            </div>

            <div class="alert-box alert-error" id="errorBox"></div>
            <div class="alert-box alert-success" id="successBox"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username yoki Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="loginUsername" class="form-control" placeholder="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Parol</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    Tizimga kirish →
                </button>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>F.I.Sh (Ismingiz)</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="regFullName" class="form-control" placeholder="Ali Valiyev" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path></svg>
                        <input type="text" id="regUsername" class="form-control" placeholder="ali_797" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="regEmail" class="form-control" placeholder="ali@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Parol</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required minlength="6">
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    Ro'yxatdan o'tish →
                </button>
            </form>

            <div class="form-footer">
                <span id="footerText">Akkauntingiz yo'qmi?</span>
                <a href="javascript:void(0)" id="footerLink" onclick="toggleFormType()">Ro'yxatdan o'ting</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/api/v1/auth';

        function toggleTheme() {
            const html = document.documentElement;
            const theme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', theme);
            document.getElementById('themeIcon').textContent = theme === 'light' ? '🌙' : '☀️';
            localStorage.setItem('theme', theme);
        }

        let currentForm = 'login';
        function switchForm(type) {
            currentForm = type;
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tabLogin');
            const tabReg = document.getElementById('tabRegister');
            const headerTitle = document.getElementById('headerTitle');
            const headerSubtitle = document.getElementById('headerSubtitle');
            const footerText = document.getElementById('footerText');
            const footerLink = document.getElementById('footerLink');

            hideAlerts();

            if (type === 'login') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
                tabLogin.classList.add('active');
                tabReg.classList.remove('active');
                headerTitle.innerText = "Xush Kelibsiz";
                headerSubtitle.innerText = "Library 797 raqamli kutubxonasiga kirish";
                footerText.innerText = "Akkauntingiz yo'qmi?";
                footerLink.innerText = "Ro'yxatdan o'ting";
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
                tabReg.classList.add('active');
                tabLogin.classList.remove('active');
                headerTitle.innerText = "Ro'yxatdan O'tish";
                headerSubtitle.innerText = "Yangi kutubxona hisobini yaratish";
                footerText.innerText = "Akkauntingiz bormi?";
                footerLink.innerText = "Tizimga kiring";
            }
        }

        function toggleFormType() {
            switchForm(currentForm === 'login' ? 'register' : 'login');
        }

        function showAlert(msg, isSuccess = false) {
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            hideAlerts();

            if (isSuccess) {
                successBox.innerText = msg;
                successBox.style.display = 'block';
            } else {
                errorBox.innerText = msg;
                errorBox.style.display = 'block';
            }
        }

        function hideAlerts() {
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('successBox').style.display = 'none';
        }

        // BACKEND INTEGRATSIYASI (LOGIN)
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert("Muvaffaqiyatli kirdingiz! Yo'naltirilmoqdasiz...", true);
                    setTimeout(() => window.location.href = 'index.html', 1200);
                } else {
                    showAlert(data.message || "Username yoki parol noto'g'ri!");
                }
            } catch (err) {
                console.log("Backend ulanmagan: Demo token saqlanmoqda");
                localStorage.setItem('token', 'demo-jwt-token');
                showAlert("Demo rejimda muvaffaqiyatli kirdingiz!", true);
                setTimeout(() => window.location.href = 'index.html', 1000);
            }
        }

        // BACKEND INTEGRATSIYASI (REGISTER)
        async function handleRegister(e) {
            e.preventDefault();
            const fullName = document.getElementById('regFullName').value;
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, username, email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    showAlert("Muvaffaqiyatli ro'yxatdan o'tdingiz! Kirish bo'limiga o'tilmoqda...", true);
                    setTimeout(() => switchForm('login'), 1500);
                } else {
                    showAlert(data.message || "Ro'yxatdan o'tishda xatolik yuz berdi.");
                }
            } catch (err) {
                showAlert("Ro'yxatdan o'tishingiz muvaffaqiyatli qabul qilindi (Demo)!", true);
                setTimeout(() => switchForm('login'), 1500);
            }
        }

        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeIcon').textContent = savedTheme === 'light' ? '🌙' : '☀️';
        });
    </script>
</body>
</html>
